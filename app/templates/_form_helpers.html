{% macro render_field(field) %}
<div class="form-group">
    <label for="{{ field.id }}">{{ field.label.text }}</label>
    {{ field(class_='input') }}
    {% if field.errors %}
        <ul class="errors">
        {% for error in field.errors %}
            <li>{{ error }}</li>
        {% endfor %}
        </ul>
    {% endif %}
</div>
{% endmacro %}
